<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="RateCompare — Loan vs Investment Simulator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(90,155)">
    <rect width="320" height="320" rx="72" fill="url(#mark)"/>
    <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="110" cy="110" r="30" stroke-width="20"/>
      <circle cx="210" cy="210" r="30" stroke-width="20"/>
      <line x1="70" y1="250" x2="250" y2="70" stroke-width="24"/>
    </g>
  </g>
  <g fill="#e2e8f0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="470" y="285" font-size="92" font-weight="800" fill="#ffffff">RateCompare</text>
    <text x="470" y="355" font-size="38" font-weight="500" fill="#bae6fd">Loan vs Investment Simulator</text>
    <text x="470" y="430" font-size="26" fill="#94a3b8">Pay down the loan or invest the cash?</text>
    <text x="470" y="465" font-size="26" fill="#94a3b8">Inflation-adjusted, side-by-side comparison.</text>
  </g>
</svg>
